name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10']
      fail-fast: false
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || echo "No requirements.txt yet"
        pip install -r requirements-dev.txt || echo "No requirements-dev.txt yet"
        pip install pytest pytest-cov || echo "Installing test dependencies"
    
    - name: Run basic tests
      run: |
        pytest tests/ -v --tb=short || echo "No tests yet - this is OK for initial setup"
      continue-on-error: true
    
    - name: Test import
      run: |
        python -c "import sys; print(sys.path)"
        python -c "from local_note import __version__; print(f'Version: {__version__}')" || echo "Package not yet importable"
      continue-on-error: true
